# Hourly sweep for stuck plugin-removal requests -- see recheck_remove_plugin_issues.py
# for the full "why" (short version: pushing `"delist": true` to a plugin's own
# repo has no webhook connection back here, so nothing notifies us; this is
# what actually picks it up without requiring the submitter to remember to
# come back and comment /recheck).
#
# The cron itself always fires on schedule -- GitHub Actions has no way to
# skip a scheduled trigger before the job starts -- but the script's first
# step is listing matching issues, and it exits immediately (one cheap API
# call, no further API usage) when there are none. So "only checks when
# there's something to check" is enforced inside the job, not the trigger.

name: Hourly plugin removal recheck

on:
  schedule:
    - cron: "23 * * * *"   # avoid the top of the hour, when scheduled-workflow load spikes
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  recheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fpp-data
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install jsonschema

      - name: Recheck stuck plugin removal requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/recheck_remove_plugin_issues.py --plugin-list pluginList.json
