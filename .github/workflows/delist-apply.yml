# Apply a verified de-list request: remove the plugin's entry from
# pluginList.json and commit directly to master.
#
# Fires when delist-verify.yml (or a maintainer) adds the `owner-verified`
# label to a `delist-request` issue: personal-repo owner match, an
# archived/gone repo, or delist:true proof-of-control all land here. No PR,
# no review gate — ownership is already established by that point.

name: Apply verified de-list

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: >-
      contains(github.event.issue.labels.*.name, 'delist-request') &&
      github.event.label.name == 'owner-verified'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fpp-data
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Remove plugin entry
        id: remove
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/scripts/remove_delisted_plugin.py --plugin-list pluginList.json

      - name: Commit and push
        if: steps.remove.outputs.removed
        env:
          REMOVED: ${{ steps.remove.outputs.removed }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginList.json
          git commit -m "Delist $REMOVED (verified request #$ISSUE_NUMBER)"
          git push

      # Both outputs are passed via env (not interpolated into the script body)
      # since `error` can contain attacker-supplied issue-form text; substituting
      # it into the JS source via ${{ }} would be a script-injection vector.
      - name: Comment + close
        uses: actions/github-script@v7
        env:
          REMOVED: ${{ steps.remove.outputs.removed }}
          ERROR_MSG: ${{ steps.remove.outputs.error }}
        with:
          script: |
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const removed = process.env.REMOVED;
            const error = process.env.ERROR_MSG;

            if (removed) {
              await github.rest.issues.createComment({owner, repo, issue_number,
                body: `✅ Removed \`${removed}\` from \`pluginList.json\` (commit ${context.sha}).`});
              await github.rest.issues.addLabels({owner, repo, issue_number, labels: ['delisted']});
              await github.rest.issues.update({owner, repo, issue_number, state: 'closed'});
            } else if (error) {
              await github.rest.issues.createComment({owner, repo, issue_number,
                body: `⚠️ Could not apply this de-list request automatically: ${error}\n\nA maintainer will need to handle this manually.`});
            }
