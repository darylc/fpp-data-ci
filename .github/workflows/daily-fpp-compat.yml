# Daily FPP-major compatibility re-check.
#
# WHAT THIS IS: the lightweight counterpart to 00-new-major-version-scan.yml. It does NOT
# clone or lint - it just re-fetches each pluginInfo.json and re-evaluates whether a
# versions[] entry now declares FPP-<major> support. When a plugin has become
# compatible, its open tracking issue is commented and CLOSED automatically (verified,
# not self-reported). Authors are never @-mentioned; closing an issue notifies no one.
#
# Runs the campaign scanner in metadata-only mode (no --plugins-dir), so it's fast.
# TARGET_MAJOR comes from the repo variable CAMPAIGN_TARGET_MAJOR (default 10).

name: ZZ - Automation - Daily FPP compatibility check

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TARGET_MAJOR: ${{ vars.CAMPAIGN_TARGET_MAJOR || '10' }}

jobs:
  recheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fpp-data
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install jsonschema

      - name: Re-evaluate FPP-${{ env.TARGET_MAJOR }} compatibility (metadata only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/campaign_scan.py \
            --target-major "$TARGET_MAJOR" \
            --plugin-list pluginList.json \
            --schema .github/schema/pluginInfo.schema.json \
            --out out

      - name: Close issues for plugins that became compatible
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/sync_issues.py \
            --summary out/summary.json --mode reconcile

      - name: Nudge, then escalate, stale tracking issues with no reply
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ env.TARGET_MAJOR }}
        uses: actions/github-script@v7
        with:
          # Neither maintainer_candidates (unverified contributor guesses, see
          # campaign_scan.py) nor an org owner (no individual to @-mention) are
          # reliable ways to reach anyone - so a tracking issue can sit open forever
          # with zero engagement. Unlike removal-escalation-sweep.yml, there's no
          # forced terminal action here (we never auto-remove a plugin just because
          # its issue went quiet - "want to sunset" is already an opt-in path in the
          # issue body) - this only nudges, then hands off to a maintainer to decide.
          #
          # Anchored on issue.created_at (never changes) rather than updated_at
          # (which our own nudge comment would bump, silently pushing the escalate
          # deadline back every run) - so NUDGE_DAYS/ESCALATE_DAYS are both measured
          # from the same fixed point.
          script: |
            const NUDGE_DAYS = 30;
            const ESCALATE_DAYS = 60;
            const NUDGE_MARKER = '<!-- campaign-stale-nudge -->';
            const { owner, repo } = context.repo;
            const target = process.env.TARGET;
            const label = `fpp${target}-compat`;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: label, per_page: 100,
            });
            core.info(`${issues.length} open FPP ${target} tracking issue(s) to check for staleness.`);

            for (const issue of issues) {
              if (issue.labels.some(l => l.name === 'needs-manual-review')) continue;

              const ageDays = (Date.now() - new Date(issue.created_at).getTime()) / 86400000;
              if (ageDays < NUDGE_DAYS) continue;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              const alreadyNudged = comments.some(c => c.body && c.body.includes(NUDGE_MARKER));

              if (!alreadyNudged) {
                await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                  body: `${NUDGE_MARKER}\n👋 Friendly reminder - this tracking issue has had no activity in ` +
                        `${Math.floor(ageDays)} days. Comment \`/recheck\` after updating your plugin, or ` +
                        `\`/submit\` if you disagree with the findings. With no response, this will be ` +
                        `flagged for a maintainer to review manually after ${ESCALATE_DAYS} days total.` });
                core.info(`#${issue.number}: nudged (${Math.floor(ageDays)}d old).`);
                continue;
              }

              if (ageDays >= ESCALATE_DAYS) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['needs-manual-review'] });
                await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                  body: `⚠️ No response after ${Math.floor(ageDays)} days (including a reminder) - flagged ` +
                        `for manual review. A maintainer will decide whether to follow up directly, wait ` +
                        `longer, or pursue removal.` });
                core.info(`#${issue.number}: escalated (${Math.floor(ageDays)}d old).`);
              }
            }

      - name: Upload refreshed dashboard
        uses: actions/upload-artifact@v4
        with:
          name: fpp-compat-dashboard
          path: out/dashboard.md
