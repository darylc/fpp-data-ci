# Guards the submission issue queue.
#
# WHY: the guided page (docs/contact/) is the only supported way to submit — it encrypts the
# author's email before it ever reaches this public repo. But the underlying Issue Form is
# always reachable directly (GitHub has no way to hide a template), so people will land on it
# and fill it in by hand. This check catches that and points them at the guided page.
#
# IT ALSO CATCHES THE WORST CASE: someone typing their email address into the token field.
# That address is ALREADY public by the time this runs — the issue is live the instant it is
# submitted. We cannot un-publish it, so the comment tells them to delete the issue and treat
# the address as exposed. This limits damage; it cannot prevent it.
#
# Runs on the PUBLIC repo, so it holds NO decryption key and cannot read any email. It only
# looks at the SHAPE of the token.

name: Check submission token

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  check:
    # Identify submissions by BODY SHAPE, not by label. GitHub silently drops labels
    # declared in an issue template when they don't exist in the repo — a label filter
    # here would mean this guard never runs and nobody notices.
    if: contains(github.event.issue.body, '### Contact token')
    runs-on: ubuntu-latest
    steps:
      - name: Inspect the contact token
        uses: actions/github-script@v7
        with:
          script: |
            const GUIDE = 'https://darylc.github.io/fpp-data-ci/contact/';
            const MARKER = '<!-- submission-token-check -->';
            const body = context.payload.issue.body || '';

            // Issue Forms render as '### Label\n\nvalue'. Pull the token field out.
            // NOTE: no \Z here — JavaScript regex has no \Z (that's Python). Using it
            // matches a literal "Z", the match fails, and EVERY issue silently looks
            // like it has no token. Split on the headings instead; it can't rot.
            let val = '';
            for (const section of body.split(/^###\s+/m)) {
              if (/^Contact token/i.test(section)) {
                val = section.replace(/^[^\n]*\n/, '').trim();   // drop the heading line
                break;
              }
            }
            const fence = val.match(/^```[a-zA-Z]*\n([\s\S]*?)\n?```$/);
            if (fence) val = fence[1].trim();

            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
            const missing = !val || val === '_No response_';
            const malformed = !missing && !isEmail && !val.startsWith('FPPC1:');

            let msg = null;
            if (isEmail) {
              msg = [
                '### ⚠️ Your email address is now public',
                '',
                'You typed an email address into the **Contact token** field. This issue was public',
                'the moment you submitted it, so that address has already been sent out in',
                'notification emails and is readable via the API. **We cannot un-publish it.**',
                '',
                '**Please:**',
                `1. **Close and delete this issue** (Settings → Delete issue), then re-submit via the [guided page](${GUIDE}).`,
                '2. Assume that address is now scraped. If it was private, consider that exposure permanent.',
                '',
                'The guided page encrypts your email in your browser so this cannot happen.',
              ].join('\n');
            } else if (missing) {
              msg = [
                '### Almost — this submission has no contact token',
                '',
                `Please re-submit using the **[guided submission page](${GUIDE})**. It fills this form in`,
                'for you and encrypts your contact email so it never appears publicly.',
                '',
                'Without a token we have no way to reach you about a security problem or a breaking',
                'change in a future FPP release, so submissions without one are not merged.',
                '',
                '**Do not paste your email address here** — this issue is public.',
              ].join('\n');
            } else if (malformed) {
              msg = [
                '### That contact token looks wrong',
                '',
                'A token should be a `FPPC1:` block generated by the',
                `**[guided submission page](${GUIDE})**. Please regenerate it and edit this issue.`,
              ].join('\n');
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // Sticky: update our previous comment rather than pile new ones up on each edit.
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(MARKER));

            if (!msg) {
              core.info('Token looks well-formed.');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id,
                  body: `${MARKER}\n✅ Contact token looks good — thanks!`,
                });
              }
              return;
            }

            const full = `${MARKER}\n${msg}`;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: full });
            }

            // Label so maintainers can filter the queue; never auto-close (a human decides).
            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: ['needs-contact-token'],
            });
